name: test

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "test/improve-test-coverage"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Setup up java"
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "liberica"

      - name: "Setup gradle"
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: "Run tests"
        run: ./gradlew :sdk:test --no-daemon
